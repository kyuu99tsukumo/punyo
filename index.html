<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>punyo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 100vw; height: 100vh;
    background: radial-gradient(ellipse at center, #0d4a5a 0%, #072838 55%, #041820 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-family: 'Hiragino Sans', sans-serif;
    overflow: hidden; gap: 28px;
  }
  .blob { width: 190px; height: 190px; animation: punya 3.2s ease-in-out infinite; }
  @keyframes punya {
    0%{transform:scale(1,1)} 22%{transform:scale(1.07,0.93)}
    48%{transform:scale(0.94,1.08)} 72%{transform:scale(1.05,0.96)} 100%{transform:scale(1,1)}
  }
  @keyframes punya-angry {
    0%{transform:scale(1,1) rotate(0deg)} 15%{transform:scale(1.05,0.96) rotate(-2deg)}
    30%{transform:scale(0.97,1.04) rotate(2deg)} 45%{transform:scale(1.04,0.97) rotate(-1deg)}
    60%{transform:scale(0.98,1.02) rotate(1deg)} 100%{transform:scale(1,1) rotate(0deg)}
  }
  @keyframes punya-sad {
    0%{transform:scale(1,1)} 30%{transform:scale(1.02,0.96)}
    60%{transform:scale(0.98,1.03)} 100%{transform:scale(1,1)}
  }
  @keyframes punya-joy {
    0%{transform:scale(1,1)} 25%{transform:scale(1.10,0.92)}
    55%{transform:scale(0.92,1.10)} 80%{transform:scale(1.06,0.95)} 100%{transform:scale(1,1)}
  }
  .blob.angry{animation-name:punya-angry;animation-duration:1.8s}
  .blob.sad{animation-name:punya-sad;animation-duration:4.5s}
  .blob.joy{animation-name:punya-joy;animation-duration:2.2s}
  @keyframes inner-drift {
    0%{transform:translate(0,0) scale(1);opacity:.55}
    40%{transform:translate(6px,-8px) scale(1.1);opacity:.75}
    70%{transform:translate(-5px,5px) scale(.94);opacity:.45}
    100%{transform:translate(0,0) scale(1);opacity:.55}
  }
  @keyframes hl-drift {
    0%{transform:translate(0,0);opacity:.88} 50%{transform:translate(-3px,4px);opacity:1}
    100%{transform:translate(0,0);opacity:.88}
  }
  @keyframes outer-pulse {
    0%,100%{opacity:.20} 50%{opacity:.38}
  }
  .inner-drift{animation:inner-drift 5s ease-in-out infinite}
  .hl-drift{animation:hl-drift 3.8s ease-in-out infinite}
  .outer-pulse{animation:outer-pulse 3.2s ease-in-out infinite}

  .emotion-buttons {
    display: grid; grid-template-columns: repeat(4,1fr);
    gap: 8px; width: 290px;
  }
  .emotion-btn {
    padding: 9px 0; border: 1px solid rgba(255,255,255,0.2);
    border-radius: 20px; background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.7); font-size: 13px;
    cursor: pointer; transition: all .25s ease; text-align: center;
  }
  .emotion-btn:hover { background:rgba(255,255,255,.14); color:#fff; border-color:rgba(255,255,255,.4); }
  .emotion-btn.active { background:rgba(255,255,255,.2); color:#fff; border-color:rgba(255,255,255,.6); }

  .color-panel { display:none; flex-direction:column; align-items:center; gap:10px; }
  .color-panel.visible { display:flex; }
  #colorCanvas { width:270px; height:130px; border-radius:10px; cursor:crosshair; border:1px solid rgba(255,255,255,.15); }
  .selected-color { display:flex; align-items:center; gap:10px; }
  .color-swatch { width:26px; height:26px; border-radius:50%; border:2px solid rgba(255,255,255,.3); background:#888; }
  .color-code { color:rgba(255,255,255,.6); font-size:13px; letter-spacing:.1em; }
  .apply-btn {
    padding:9px 28px; border:none; border-radius:20px;
    background:rgba(255,255,255,.14); color:#fff; font-size:14px;
    cursor:pointer; transition:background .2s;
  }
  .apply-btn:hover { background:rgba(255,255,255,.24); }
</style>
</head>
<body>

<div class="blob" id="blob">
  <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="outerGlow" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#a0e8f8" stop-opacity=".18"/>
        <stop offset="60%" stop-color="#60c8e8" stop-opacity=".05"/>
        <stop offset="100%" stop-color="#40b8d8" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="blobBody" cx="38%" cy="32%" r="72%">
        <stop offset="0%" stop-color="#e8f8ff" stop-opacity=".92"/>
        <stop offset="22%" stop-color="#d0f0ff" stop-opacity=".72"/>
        <stop offset="48%" stop-color="#a8e0f8" stop-opacity=".38"/>
        <stop offset="72%" stop-color="#80c8e8" stop-opacity=".14"/>
        <stop offset="88%" stop-color="#60b8d8" stop-opacity=".06"/>
        <stop offset="100%" stop-color="#40a8c8" stop-opacity=".01"/>
      </radialGradient>
      <radialGradient id="innerLight" cx="36%" cy="28%" r="60%">
        <stop offset="0%" stop-color="#fff" stop-opacity=".85"/>
        <stop offset="35%" stop-color="#e0f8ff" stop-opacity=".35"/>
        <stop offset="100%" stop-color="#c0eeff" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="mainHL" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#fff" stop-opacity="1"/>
        <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="bottomRef" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#b0e8ff" stop-opacity=".25"/>
        <stop offset="100%" stop-color="#80d0f0" stop-opacity="0"/>
      </radialGradient>
      <filter id="softBlur"><feGaussianBlur stdDeviation="7"/></filter>
      <filter id="tinyBlur"><feGaussianBlur stdDeviation="1.8"/></filter>
    </defs>
    <ellipse class="outer-pulse" cx="100" cy="102" rx="88" ry="90" fill="url(#outerGlow)" filter="url(#softBlur)"/>
    <ellipse id="blobEllipse" cx="100" cy="104" rx="72" ry="76" fill="url(#blobBody)"/>
    <ellipse cx="100" cy="104" rx="72" ry="76" fill="none" stroke="#90d8f0" stroke-width=".7" stroke-opacity=".22"/>
    <ellipse class="inner-drift" cx="80" cy="74" rx="46" ry="36" fill="url(#innerLight)" filter="url(#tinyBlur)"/>
    <ellipse class="hl-drift" cx="73" cy="62" rx="20" ry="13" fill="url(#mainHL)"/>
    <ellipse class="hl-drift" cx="60" cy="54" rx="7" ry="4.5" fill="white" fill-opacity=".95"/>
    <ellipse cx="55" cy="50" rx="2.5" ry="1.8" fill="white" fill-opacity="1"/>
    <ellipse cx="118" cy="142" rx="24" ry="12" fill="url(#bottomRef)" filter="url(#tinyBlur)"/>
  </svg>
</div>

<div class="emotion-buttons">
  <button class="emotion-btn" data-type="joy">喜び</button>
  <button class="emotion-btn" data-type="joy">期待</button>
  <button class="emotion-btn" data-type="calm">信頼</button>
  <button class="emotion-btn" data-type="joy">驚き</button>
  <button class="emotion-btn" data-type="sad">悲しみ</button>
  <button class="emotion-btn" data-type="sad">嫌悪</button>
  <button class="emotion-btn" data-type="angry">怒り</button>
  <button class="emotion-btn" data-type="angry">恐れ</button>
</div>

<div class="color-panel" id="colorPanel">
  <canvas id="colorCanvas" width="540" height="260"></canvas>
  <div class="selected-color">
    <div class="color-swatch" id="colorSwatch"></div>
    <span class="color-code" id="colorCode">#888888</span>
  </div>
  <button class="apply-btn" id="applyBtn">この色を入れる</button>
</div>

<script>
const blob = document.getElementById('blob');
const colorPanel = document.getElementById('colorPanel');
const canvas = document.getElementById('colorCanvas');
const ctx = canvas.getContext('2d');
const swatch = document.getElementById('colorSwatch');
const codeEl = document.getElementById('colorCode');
const applyBtn = document.getElementById('applyBtn');
let selectedColor = '#888888';

function drawPanel() {
  const w = canvas.width, h = canvas.height;
  for (let x = 0; x < w; x++) {
    const hue = (x / w) * 360;
    const grad = ctx.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0, `hsl(${hue},100%,95%)`);
    grad.addColorStop(0.5, `hsl(${hue},100%,50%)`);
    grad.addColorStop(1, `hsl(${hue},100%,10%)`);
    ctx.fillStyle = grad;
    ctx.fillRect(x, 0, 1, h);
  }
  const wg = ctx.createLinearGradient(0,0,w*0.3,0);
  wg.addColorStop(0,'rgba(255,255,255,0.85)');
  wg.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle = wg;
  ctx.fillRect(0,0,w,h);
}
drawPanel();

canvas.addEventListener('click', e => {
  const r = canvas.getBoundingClientRect();
  const x = (e.clientX - r.left) * (canvas.width / r.width);
  const y = (e.clientY - r.top) * (canvas.height / r.height);
  const p = ctx.getImageData(x, y, 1, 1).data;
  selectedColor = `#${p[0].toString(16).padStart(2,'0')}${p[1].toString(16).padStart(2,'0')}${p[2].toString(16).padStart(2,'0')}`;
  swatch.style.background = selectedColor;
  codeEl.textContent = selectedColor.toUpperCase();
});

document.querySelectorAll('.emotion-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.emotion-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    blob.className = 'blob ' + btn.dataset.type;
    colorPanel.classList.add('visible');
  });
});

applyBtn.addEventListener('click', () => {
  if (selectedColor === '#888888') return;
  const r = parseInt(selectedColor.slice(1,3),16);
  const g = parseInt(selectedColor.slice(3,5),16);
  const b = parseInt(selectedColor.slice(5,7),16);
  const grad = document.getElementById('blobBody');
  const c = (rv,gv,bv) => `rgb(${Math.min(rv,255)},${Math.min(gv,255)},${Math.min(bv,255)})`;
  grad.children[0].setAttribute('stop-color', c(r+60,g+60,b+60));
  grad.children[1].setAttribute('stop-color', c(r+30,g+30,b+30));
  grad.children[2].setAttribute('stop-color', selectedColor);
  grad.children[3].setAttribute('stop-color', `rgb(${Math.max(r-30,0)},${Math.max(g-30,0)},${Math.max(b-30,0)})`);
  colorPanel.classList.remove('visible');
  document.querySelectorAll('.emotion-btn').forEach(b => b.classList.remove('active'));
});
</script>
</body>
</html>
