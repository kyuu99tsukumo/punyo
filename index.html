<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>punyo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 100vw; height: 100vh;
    background: radial-gradient(ellipse at center, #0d4a5a 0%, #072838 55%, #041820 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-family: 'Hiragino Sans', sans-serif;
    overflow: hidden; gap: 20px;
  }
  .blob { width: 160px; height: 160px; animation: punya 3.2s ease-in-out infinite; }
  @keyframes punya {
    0%{transform:scale(1,1)} 22%{transform:scale(1.07,0.93)}
    48%{transform:scale(0.94,1.08)} 72%{transform:scale(1.05,0.96)} 100%{transform:scale(1,1)}
  }
  @keyframes punya-angry {
    0%{transform:scale(1,1) rotate(0deg)} 15%{transform:scale(1.05,0.96) rotate(-2deg)}
    30%{transform:scale(0.97,1.04) rotate(2deg)} 45%{transform:scale(1.04,0.97) rotate(-1deg)}
    60%{transform:scale(0.98,1.02) rotate(1deg)} 100%{transform:scale(1,1) rotate(0deg)}
  }
  @keyframes punya-sad {
    0%{transform:scale(1,1)} 30%{transform:scale(1.02,0.96)}
    60%{transform:scale(0.98,1.03)} 100%{transform:scale(1,1)}
  }
  @keyframes punya-joy {
    0%{transform:scale(1,1)} 25%{transform:scale(1.10,0.92)}
    55%{transform:scale(0.92,1.10)} 80%{transform:scale(1.06,0.95)} 100%{transform:scale(1,1)}
  }
  .blob.angry{animation-name:punya-angry;animation-duration:1.8s}
  .blob.sad{animation-name:punya-sad;animation-duration:4.5s}
  .blob.joy{animation-name:punya-joy;animation-duration:2.2s}
  @keyframes inner-drift {
    0%{transform:translate(0,0) scale(1);opacity:.55} 40%{transform:translate(6px,-8px) scale(1.1);opacity:.75}
    70%{transform:translate(-5px,5px) scale(.94);opacity:.45} 100%{transform:translate(0,0) scale(1);opacity:.55}
  }
  @keyframes hl-drift {
    0%{transform:translate(0,0);opacity:.88} 50%{transform:translate(-3px,4px);opacity:1} 100%{transform:translate(0,0);opacity:.88}
  }
  @keyframes outer-pulse { 0%,100%{opacity:.20} 50%{opacity:.38} }
  .inner-drift{animation:inner-drift 5s ease-in-out infinite}
  .hl-drift{animation:hl-drift 3.8s ease-in-out infinite}
  .outer-pulse{animation:outer-pulse 3.2s ease-in-out infinite}
  .emotion-buttons { display:grid; grid-template-columns:repeat(4,1fr); gap:7px; width:280px; }
  .emotion-btn {
    padding:8px 0; border:1px solid rgba(255,255,255,0.2);
    border-radius:18px; background:rgba(255,255,255,0.06);
    color:rgba(255,255,255,0.7); font-size:12px;
    cursor:pointer; transition:all .2s ease; text-align:center;
  }
  .emotion-btn:hover{background:rgba(255,255,255,.14);color:#fff;border-color:rgba(255,255,255,.4)}
  .emotion-btn.active{background:rgba(255,255,255,.22);color:#fff;border-color:rgba(255,255,255,.6)}
  .color-panel{display:none;flex-direction:column;align-items:center;gap:8px}
  .color-panel.visible{display:flex}
  #colorCanvas{width:260px;height:120px;border-radius:8px;cursor:crosshair;border:1px solid rgba(255,255,255,.15)}
  .selected-color{display:flex;align-items:center;gap:8px}
  .color-swatch{width:22px;height:22px;border-radius:50%;border:2px solid rgba(255,255,255,.3);background:#888}
  .color-code{color:rgba(255,255,255,.6);font-size:12px;letter-spacing:.1em}
  .apply-btn{
    padding:8px 24px;border:none;border-radius:18px;
    background:rgba(255,255,255,.14);color:#fff;font-size:13px;cursor:pointer;transition:background .2s
  }
  .apply-btn:hover{background:rgba(255,255,255,.24)}
  .records{display:flex;gap:10px;align-items:center;min-height:52px}
  .record-item{
    display:flex;flex-direction:column;align-items:center;gap:4px;
    background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
    border-radius:14px;padding:8px 12px;min-width:72px;
  }
  .record-swatch{width:20px;height:20px;border-radius:50%;border:1.5px solid rgba(255,255,255,.3)}
  .record-emotion{color:rgba(255,255,255,.8);font-size:12px}
  .record-code{color:rgba(255,255,255,.4);font-size:10px;letter-spacing:.05em}
  .modal-overlay{
    display:none;position:fixed;inset:0;
    background:rgba(0,0,0,.6);backdrop-filter:blur(4px);
    align-items:center;justify-content:center;z-index:100;
  }
  .modal-overlay.visible{display:flex}
  .modal{
    background:#0d2a35;border:1px solid rgba(255,255,255,.15);
    border-radius:20px;padding:24px;width:300px;
    display:flex;flex-direction:column;align-items:center;gap:16px;
  }
  .modal-title{color:rgba(255,255,255,.8);font-size:14px;text-align:center}
  .modal-records{display:flex;flex-direction:column;gap:8px;width:100%}
  .modal-record{
    display:flex;align-items:center;gap:12px;
    background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
    border-radius:12px;padding:10px 14px;cursor:pointer;transition:background .2s;
  }
  .modal-record:hover{background:rgba(255,255,255,.15)}
  .modal-swatch{width:20px;height:20px;border-radius:50%;flex-shrink:0}
  .modal-emotion{color:#fff;font-size:13px}
  .modal-cancel{
    padding:8px 24px;border:1px solid rgba(255,255,255,.2);border-radius:18px;
    background:transparent;color:rgba(255,255,255,.5);font-size:13px;cursor:pointer;transition:all .2s
  }
  .modal-cancel:hover{background:rgba(255,255,255,.08);color:#fff}
</style>
</head>
<body>

<div class="blob" id="blob">
  <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="outerGlow" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#a0e8f8" stop-opacity=".18"/>
        <stop offset="60%" stop-color="#60c8e8" stop-opacity=".05"/>
        <stop offset="100%" stop-color="#40b8d8" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="blobBody" cx="38%" cy="32%" r="72%">
        <stop offset="0%" stop-color="#e8f8ff" stop-opacity=".92"/>
        <stop offset="22%" stop-color="#d0f0ff" stop-opacity=".72"/>
        <stop offset="48%" stop-color="#a8e0f8" stop-opacity=".38"/>
        <stop offset="72%" stop-color="#80c8e8" stop-opacity=".14"/>
        <stop offset="88%" stop-color="#60b8d8" stop-opacity=".06"/>
        <stop offset="100%" stop-color="#40a8c8" stop-opacity=".01"/>
      </radialGradient>
      <radialGradient id="innerLight" cx="36%" cy="28%" r="60%">
        <stop offset="0%" stop-color="#fff" stop-opacity=".85"/>
        <stop offset="35%" stop-color="#e0f8ff" stop-opacity=".35"/>
        <stop offset="100%" stop-color="#c0eeff" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="mainHL" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#fff" stop-opacity="1"/>
        <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="bottomRef" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#b0e8ff" stop-opacity=".25"/>
        <stop offset="100%" stop-color="#80d0f0" stop-opacity="0"/>
      </radialGradient>
      <filter id="softBlur"><feGaussianBlur stdDeviation="7"/></filter>
      <filter id="tinyBlur"><feGaussianBlur stdDeviation="1.8"/></filter>
    </defs>
    <ellipse class="outer-pulse" cx="100" cy="102" rx="88" ry="90" fill="url(#outerGlow)" filter="url(#softBlur)"/>
    <ellipse id="blobEllipse" cx="100" cy="104" rx="72" ry="76" fill="url(#blobBody)"/>
    <ellipse cx="100" cy="104" rx="72" ry="76" fill="none" stroke="#90d8f0" stroke-width=".7" stroke-opacity=".22"/>
    <ellipse class="inner-drift" cx="80" cy="74" rx="46" ry="36" fill="url(#innerLight)" filter="url(#tinyBlur)"/>
    <ellipse class="hl-drift" cx="73" cy="62" rx="20" ry="13" fill="url(#mainHL)"/>
    <ellipse class="hl-drift" cx="60" cy="54" rx="7" ry="4.5" fill="white" fill-opacity=".95"/>
    <ellipse cx="55" cy="50" rx="2.5" ry="1.8" fill="white" fill-opacity="1"/>
    <ellipse cx="118" cy="142" rx="24" ry="12" fill="url(#bottomRef)" filter="url(#tinyBlur)"/>
  </svg>
</div>

<div class="emotion-buttons">
  <button class="emotion-btn" data-emotion="喜び" data-type="joy">喜び</button>
  <button class="emotion-btn" data-emotion="期待" data-type="joy">期待</button>
  <button class="emotion-btn" data-emotion="信頼" data-type="calm">信頼</button>
  <button class="emotion-btn" data-emotion="驚き" data-type="joy">驚き</button>
  <button class="emotion-btn" data-emotion="悲しみ" data-type="sad">悲しみ</button>
  <button class="emotion-btn" data-emotion="嫌悪" data-type="sad">嫌悪</button>
  <button class="emotion-btn" data-emotion="怒り" data-type="angry">怒り</button>
  <button class="emotion-btn" data-emotion="恐れ" data-type="angry">恐れ</button>
</div>

<div class="color-panel" id="colorPanel">
  <canvas id="colorCanvas" width="520" height="240"></canvas>
  <div class="selected-color">
    <div class="color-swatch" id="colorSwatch"></div>
    <span class="color-code" id="colorCode">#888888</span>
  </div>
  <button class="apply-btn" id="applyBtn">この色を入れる</button>
</div>

<div class="records" id="records"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <p class="modal-title">どれを変えますか？</p>
    <div class="modal-records" id="modalRecords"></div>
    <button class="modal-cancel" id="modalCancel">やめる</button>
  </div>
</div>

<script>
const blob=document.getElementById('blob');
const colorPanel=document.getElementById('colorPanel');
const canvas=document.getElementById('colorCanvas');
const ctx=canvas.getContext('2d');
const swatch=document.getElementById('colorSwatch');
const codeEl=document.getElementById('colorCode');
const applyBtn=document.getElementById('applyBtn');
const recordsEl=document.getElementById('records');
const modalOverlay=document.getElementById('modalOverlay');
const modalRecords=document.getElementById('modalRecords');
const modalCancel=document.getElementById('modalCancel');
let selectedColor='#888888';
let selectedEmotion='';
let selectedType='';
let records=[];
let pendingRecord=null;

function drawPanel(){
  const w=canvas.width,h=canvas.height;
  for(let x=0;x<w;x++){
    const hue=(x/w)*360;
    const grad=ctx.createLinearGradient(0,0,0,h);
    grad.addColorStop(0,`hsl(${hue},100%,95%)`);
    grad.addColorStop(0.5,`hsl(${hue},100%,50%)`);
    grad.addColorStop(1,`hsl(${hue},100%,10%)`);
    ctx.fillStyle=grad;
    ctx.fillRect(x,0,1,h);
  }
  const wg=ctx.createLinearGradient(0,0,w*0.3,0);
  wg.addColorStop(0,'rgba(255,255,255,0.85)');
  wg.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=wg;
  ctx.fillRect(0,0,w,h);
}
drawPanel();

canvas.addEventListener('click',e=>{
  const r=canvas.getBoundingClientRect();
  const x=(e.clientX-r.left)*(canvas.width/r.width);
  const y=(e.clientY-r.top)*(canvas.height/r.height);
  const p=ctx.getImageData(x,y,1,1).data;
  selectedColor=`#${p[0].toString(16).padStart(2,'0')}${p[1].toString(16).padStart(2,'0')}${p[2].toString(16).padStart(2,'0')}`;
  swatch.style.background=selectedColor;
  codeEl.textContent=selectedColor.toUpperCase();
});

document.querySelectorAll('.emotion-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.emotion-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    selectedEmotion=btn.dataset.emotion;
    selectedType=btn.dataset.type;
    blob.className='blob '+selectedType;
    colorPanel.classList.add('visible');
  });
});

function applyColorToBlob(color){
  const r=parseInt(color.slice(1,3),16);
  const g=parseInt(color.slice(3,5),16);
  const b=parseInt(color.slice(5,7),16);
  const grad=document.getElementById('blobBody');
  const c=(rv,gv,bv)=>`rgb(${Math.min(rv,255)},${Math.min(gv,255)},${Math.min(bv,255)})`;
  grad.children[0].setAttribute('stop-color',c(r+60,g+60,b+60));
  grad.children[1].setAttribute('stop-color',c(r+30,g+30,b+30));
  grad.children[2].setAttribute('stop-color',color);
  grad.children[3].setAttribute('stop-color',`rgb(${Math.max(r-30,0)},${Math.max(g-30,0)},${Math.max(b-30,0)})`);
}

function renderRecords(){
  recordsEl.innerHTML='';
  records.forEach(rec=>{
    const el=document.createElement('div');
    el.className='record-item';
    el.innerHTML=`<div class="record-swatch" style="background:${rec.color}"></div><span class="record-emotion">${rec.emotion}</span><span class="record-code">${rec.color.toUpperCase()}</span>`;
    recordsEl.appendChild(el);
  });
}

function addRecord(emotion,color,type){
  const rec={emotion,color,type};
  if(records.length<3){
    records.push(rec);
    applyColorToBlob(color);
    renderRecords();
  } else {
    pendingRecord=rec;
    showModal();
  }
}

function showModal(){
  modalRecords.innerHTML='';
  records.forEach((rec,i)=>{
    const el=document.createElement('div');
    el.className='modal-record';
    el.innerHTML=`<div class="modal-swatch" style="background:${rec.color}"></div><span class="modal-emotion">${rec.emotion}　${rec.color.toUpperCase()}</span>`;
    el.addEventListener('click',()=>{
      records[i]=pendingRecord;
      pendingRecord=null;
      applyColorToBlob(records[i].color);
      renderRecords();
      hideModal();
    });
    modalRecords.appendChild(el);
  });
  modalOverlay.classList.add('visible');
}

function hideModal(){
  modalOverlay.classList.remove('visible');
  pendingRecord=null;
}

modalCancel.addEventListener('click',hideModal);

applyBtn.addEventListener('click',()=>{
  if(selectedColor==='#888888'||!selectedEmotion)return;
  addRecord(selectedEmotion,selectedColor,selectedType);
  colorPanel.classList.remove('visible');
  document.querySelectorAll('.emotion-btn').forEach(b=>b.classList.remove('active'));
  selectedColor='#888888';
  swatch.style.background='#888';
  codeEl.textContent='#888888';
});
</script>
</body>
</html>
