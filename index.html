<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>punyo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
  }
  body {
    width: 100vw;
    height: 100vh;
    background: radial-gradient(ellipse at center, #0d4a5a 0%, #072838 55%, #041820 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    font-family: 'Hiragino Sans', sans-serif;
    overflow: hidden;
    gap: 0;
    /* iOS Safari対応 */
    min-height: -webkit-fill-available;
  }

  /* ── 球体 ── */
  .blob {
    width: 220px;
    height: 220px;
    flex-shrink: 0;
    margin-top: 12px;
    animation: punya 3.2s ease-in-out infinite;
  }
  @keyframes punya {
    0%{transform:scale(1,1)} 22%{transform:scale(1.07,0.93)}
    48%{transform:scale(0.94,1.08)} 72%{transform:scale(1.05,0.96)} 100%{transform:scale(1,1)}
  }
  @keyframes punya-angry {
    0%{transform:scale(1,1) rotate(0deg)} 15%{transform:scale(1.05,0.96) rotate(-2deg)}
    30%{transform:scale(0.97,1.04) rotate(2deg)} 100%{transform:scale(1,1) rotate(0deg)}
  }
  @keyframes punya-sad {
    0%{transform:scale(1,1)} 30%{transform:scale(1.02,0.96)} 60%{transform:scale(0.98,1.03)} 100%{transform:scale(1,1)}
  }
  @keyframes punya-joy {
    0%{transform:scale(1,1)} 25%{transform:scale(1.10,0.92)}
    55%{transform:scale(0.92,1.10)} 80%{transform:scale(1.06,0.95)} 100%{transform:scale(1,1)}
  }
  .blob.angry{animation-name:punya-angry;animation-duration:1.8s}
  .blob.sad{animation-name:punya-sad;animation-duration:4.5s}
  .blob.joy{animation-name:punya-joy;animation-duration:2.2s}
  @keyframes inner-drift {
    0%{transform:translate(0,0) scale(1);opacity:.55} 40%{transform:translate(6px,-8px) scale(1.1);opacity:.75}
    70%{transform:translate(-5px,5px) scale(.94);opacity:.45} 100%{transform:translate(0,0) scale(1);opacity:.55}
  }
  @keyframes hl-drift {
    0%{transform:translate(0,0);opacity:.88} 50%{transform:translate(-3px,4px);opacity:1} 100%{transform:translate(0,0);opacity:.88}
  }
  @keyframes outer-pulse { 0%,100%{opacity:.20} 50%{opacity:.38} }
  .inner-drift{animation:inner-drift 5s ease-in-out infinite}
  .hl-drift{animation:hl-drift 3.8s ease-in-out infinite}
  .outer-pulse{animation:outer-pulse 3.2s ease-in-out infinite}

  /* ── 入力エリア（固定幅） ── */
  .input-area {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    width: 83vw;
    max-width: 400px;
    margin-top: 10px;
  }

  /* ── 感情ボタン ── */
  .emotion-buttons {
    display: grid;
    grid-template-columns: repeat(4,1fr);
    gap: 7px;
    width: 100%;
  }
  .emotion-btn {
    padding: 9px 0;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 18px;
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.7);
    font-size: 15px;
    cursor: pointer;
    transition: all .2s ease;
    text-align: center;
    font-family: 'Hiragino Sans', sans-serif;
  }
  .emotion-btn:hover:not(:disabled){background:rgba(255,255,255,.14);color:#fff;border-color:rgba(255,255,255,.4)}
  .emotion-btn.active{color:#fff;border-color:rgba(255,255,255,.4);font-weight:bold}
  .emotion-btn.hidden{display:none}

  .more-btn{
    background:none;border:none;color:rgba(255,255,255,.45);
    font-size:14px;cursor:pointer;padding:2px 0;
    font-family: 'Hiragino Sans', sans-serif;
  }
  .more-btn:hover{color:rgba(255,255,255,.8)}

  /* ── カラーパネル ── */
  #colorCanvas{
    width:100%;height:115px;border-radius:8px;
    cursor:crosshair;border:1px solid rgba(255,255,255,.15);
    display:block; touch-action: none;
  }
  .selected-color{
    display:flex;align-items:center;gap:8px;
    min-height:30px;
  }
  .color-swatch{display:none}
  .color-code{display:none}

  /* ── %スライダー ── */
  .percent-row{display:flex;align-items:center;gap:8px;width:100%}
  .percent-label{color:rgba(255,255,255,.5);font-size:14px;white-space:nowrap}
  .percent-slider{
    flex:1;-webkit-appearance:none;height:3px;
    border-radius:2px;background:rgba(255,255,255,.2);outline:none;
  }
  .percent-slider::-webkit-slider-thumb{
    -webkit-appearance:none;width:16px;height:16px;
    border-radius:50%;background:rgba(255,255,255,.8);cursor:pointer;
  }
  .percent-value{color:#fff;font-size:16px;font-weight:bold;width:48px;text-align:right}
  .percent-remain{color:rgba(255,255,255,.4);font-size:13px;text-align:center}

  /* ── 入れるボタン ── */
  .apply-btn{
    padding:11px 28px;border:none;border-radius:22px;
    background:rgba(255,255,255,.08);color:rgba(255,255,255,.4);
    font-size:16px;cursor:not-allowed;transition:all .2s;width:100%;
    font-family: 'Hiragino Sans', sans-serif;
  }
  .apply-btn.ready{background:rgba(255,255,255,.18);color:#fff;cursor:pointer}
  .apply-btn.ready:hover{background:rgba(255,255,255,.28)}

  /* ── 記録エリア（高さ固定・絶対位置） ── */
  /* bodyの最後の子として常に同じ場所に */
  .records-area {
    flex-shrink: 0;
    width: 83vw;
    max-width: 400px;
    min-height: 96px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    align-items: flex-start;
    padding-top: 6px;
    margin-top: 6px;
  }

  .record-item{
    display:flex;flex-direction:column;align-items:center;gap:4px;
    background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
    border-radius:14px;padding:8px 12px;min-width:80px;
    cursor:pointer;transition:all .2s;
  }
  .record-item:hover{background:rgba(255,255,255,.14);border-color:rgba(255,255,255,.3)}
  .record-item.editing{border-color:rgba(255,255,255,.6);background:rgba(255,255,255,.18)}
  .record-swatch{width:22px;height:22px;border-radius:50%;border:1.5px solid rgba(255,255,255,.3)}
  .record-emotion{color:rgba(255,255,255,.8);font-size:14px}
  .record-pct{color:rgba(255,255,255,.5);font-size:13px}
  .record-code{color:rgba(255,255,255,.35);font-size:10px;letter-spacing:.05em}
  .record-edit{color:rgba(255,255,255,.3);font-size:10px}

  /* ── モーダル ── */
  .modal-overlay{
    display:none;position:fixed;inset:0;
    background:rgba(0,0,0,.6);backdrop-filter:blur(4px);
    align-items:center;justify-content:center;z-index:100;
  }
  .modal-overlay.visible{display:flex}
  .modal{
    background:#0d2a35;border:1px solid rgba(255,255,255,.15);
    border-radius:20px;padding:24px;width:290px;
    display:flex;flex-direction:column;align-items:center;gap:14px;
  }
  .modal-title{color:rgba(255,255,255,.8);font-size:14px;text-align:center}
  .modal-records{display:flex;flex-direction:column;gap:8px;width:100%}
  .modal-record{
    display:flex;align-items:center;gap:10px;
    background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
    border-radius:12px;padding:9px 12px;cursor:pointer;transition:background .2s;
  }
  .modal-record:hover{background:rgba(255,255,255,.15)}
  .modal-swatch{width:18px;height:18px;border-radius:50%;flex-shrink:0}
  .modal-info{display:flex;flex-direction:column;gap:2px}
  .modal-emotion{color:#fff;font-size:13px}
  .modal-pct{color:rgba(255,255,255,.5);font-size:11px}
  .modal-cancel{
    padding:7px 22px;border:1px solid rgba(255,255,255,.2);border-radius:16px;
    background:transparent;color:rgba(255,255,255,.5);font-size:13px;cursor:pointer;
  }
  .modal-cancel:hover{background:rgba(255,255,255,.08);color:#fff}
</style>
</head>
<body>

<!-- 球体 -->
<div class="blob" id="blob">
  <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" id="blobSvg">
    <defs>
      <radialGradient id="outerGlow" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#a0e8f8" stop-opacity=".18"/>
        <stop offset="60%" stop-color="#60c8e8" stop-opacity=".05"/>
        <stop offset="100%" stop-color="#40b8d8" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="blobBody" cx="38%" cy="32%" r="72%">
        <stop offset="0%" stop-color="#e8f8ff" stop-opacity=".08"/>
        <stop offset="50%" stop-color="#c0eeff" stop-opacity=".04"/>
        <stop offset="100%" stop-color="#a0d8ee" stop-opacity=".02"/>
      </radialGradient>
      <radialGradient id="innerLight" cx="36%" cy="28%" r="60%">
        <stop offset="0%" stop-color="#fff" stop-opacity=".85"/>
        <stop offset="35%" stop-color="#e0f8ff" stop-opacity=".35"/>
        <stop offset="100%" stop-color="#c0eeff" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="mainHL" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#fff" stop-opacity="1"/>
        <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="bottomRef" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#b0e8ff" stop-opacity=".25"/>
        <stop offset="100%" stop-color="#80d0f0" stop-opacity="0"/>
      </radialGradient>
      <clipPath id="blobClip">
        <ellipse cx="100" cy="104" rx="70" ry="74"/>
      </clipPath>
      <filter id="softBlur"><feGaussianBlur stdDeviation="7"/></filter>
      <filter id="tinyBlur"><feGaussianBlur stdDeviation="1.8"/></filter>
    </defs>
    <ellipse class="outer-pulse" cx="100" cy="102" rx="88" ry="90" fill="url(#outerGlow)" filter="url(#softBlur)"/>
    <ellipse cx="100" cy="104" rx="72" ry="76" fill="url(#blobBody)"/>
    <g id="colorIslands" clip-path="url(#blobClip)"></g>
    <ellipse cx="100" cy="104" rx="72" ry="76" fill="none" stroke="#90d8f0" stroke-width=".7" stroke-opacity=".22"/>
    <ellipse class="inner-drift" cx="80" cy="74" rx="46" ry="36" fill="url(#innerLight)" filter="url(#tinyBlur)"/>
    <ellipse class="hl-drift" cx="73" cy="62" rx="20" ry="13" fill="url(#mainHL)"/>
    <ellipse class="hl-drift" cx="60" cy="54" rx="7" ry="4.5" fill="white" fill-opacity=".95"/>
    <ellipse cx="55" cy="50" rx="2.5" ry="1.8" fill="white" fill-opacity="1"/>
    <ellipse cx="118" cy="142" rx="24" ry="12" fill="url(#bottomRef)" filter="url(#tinyBlur)"/>
    <g id="emotionLabels"></g>
  </svg>
</div>

<!-- 入力エリア -->
<div class="input-area">
  <div class="emotion-buttons" id="emotionButtons">
    <button class="emotion-btn" data-emotion="嬉しい" data-type="joy">嬉しい</button>
    <button class="emotion-btn" data-emotion="楽しい" data-type="joy">楽しい</button>
    <button class="emotion-btn" data-emotion="好き" data-type="joy">好き</button>
    <button class="emotion-btn" data-emotion="穏やか" data-type="calm">穏やか</button>
    <button class="emotion-btn" data-emotion="悲しい" data-type="sad">悲しい</button>
    <button class="emotion-btn" data-emotion="イライラ" data-type="angry">イライラ</button>
    <button class="emotion-btn" data-emotion="不安" data-type="angry">不安</button>
    <button class="emotion-btn" data-emotion="疲れた" data-type="sad">疲れた</button>
  </div>
  <button class="more-btn" id="moreBtn">もっと見る ▾</button>
  <div class="emotion-buttons" id="moreEmotions" style="display:none;">
    <button class="emotion-btn" data-emotion="怒り" data-type="angry">怒り</button>
    <button class="emotion-btn" data-emotion="モヤモヤ" data-type="sad">モヤモヤ</button>
    <button class="emotion-btn" data-emotion="しんどい" data-type="sad">しんどい</button>
    <button class="emotion-btn" data-emotion="嫌い" data-type="angry">嫌い</button>
    <button class="emotion-btn" data-emotion="退屈" data-type="sad">退屈</button>
    <button class="emotion-btn" data-emotion="ワクワク" data-type="joy">ワクワク</button>
    <button class="emotion-btn" data-emotion="ありがたい" data-type="calm">ありがたい</button>
    <button class="emotion-btn" data-emotion="興味深い" data-type="calm">興味深い</button>
    <button class="emotion-btn" data-emotion="スッキリ" data-type="joy">スッキリ</button>
  </div>

  <canvas id="colorCanvas" width="580" height="230"></canvas>


  <div class="percent-row">
    <span class="percent-label">割合</span>
    <input type="range" class="percent-slider" id="percentSlider" min="0" max="100" value="50">
    <span class="percent-value" id="percentValue">50%</span>
  </div>
  <span class="percent-remain" id="percentRemain">残り 100%</span>

  <button class="apply-btn" id="applyBtn">言葉と色の両方を選ぶと入ります</button>
</div>

<!-- 記録エリア（高さ固定・常にここにある） -->
<div class="records-area" id="records"></div>

<!-- モーダル -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <p class="modal-title">どれを変えますか？</p>
    <div class="modal-records" id="modalRecords"></div>
    <button class="modal-cancel" id="modalCancel">やめる</button>
  </div>
</div>

<script>
const blob = document.getElementById('blob');
const canvas = document.getElementById('colorCanvas');
const ctx = canvas.getContext('2d');
const swatch = document.getElementById('colorSwatch');
const codeEl = document.getElementById('colorCode');
const applyBtn = document.getElementById('applyBtn');
const percentSlider = document.getElementById('percentSlider');
const percentValue = document.getElementById('percentValue');
const percentRemain = document.getElementById('percentRemain');
const recordsEl = document.getElementById('records');
const modalOverlay = document.getElementById('modalOverlay');
const modalRecordsEl = document.getElementById('modalRecords');
const modalCancel = document.getElementById('modalCancel');
const colorIslands = document.getElementById('colorIslands');

let selectedColor = null;
let selectedEmotion = null;
let selectedType = null;
let selectedPercent = 50;
let records = [];
let pendingRecord = null;
let editingIndex = -1;

// カラーパネル
function drawPanel() {
  const w = canvas.width, h = canvas.height;
  for (let x = 0; x < w; x++) {
    const hue = (x / w) * 360;
    const grad = ctx.createLinearGradient(0,0,0,h);
    grad.addColorStop(0, `hsl(${hue},100%,95%)`);
    grad.addColorStop(0.5, `hsl(${hue},100%,50%)`);
    grad.addColorStop(1, `hsl(${hue},100%,10%)`);
    ctx.fillStyle = grad;
    ctx.fillRect(x,0,1,h);
  }
  const wg = ctx.createLinearGradient(0,0,w*0.3,0);
  wg.addColorStop(0,'rgba(255,255,255,0.85)');
  wg.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle = wg;
  ctx.fillRect(0,0,w,h);
}
drawPanel();

function pickColor(e) {
  const r = canvas.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  const x = (clientX - r.left) * (canvas.width / r.width);
  const y = (clientY - r.top) * (canvas.height / r.height);
  const p = ctx.getImageData(
    Math.max(0,Math.min(canvas.width-1,Math.round(x))),
    Math.max(0,Math.min(canvas.height-1,Math.round(y))),1,1).data;
  selectedColor = `#${p[0].toString(16).padStart(2,'0')}${p[1].toString(16).padStart(2,'0')}${p[2].toString(16).padStart(2,'0')}`;
  swatch.style.background = selectedColor;
  updateActiveBtn();
  checkReady();
}
canvas.addEventListener('click', pickColor);
canvas.addEventListener('touchstart', e=>{e.preventDefault();pickColor(e);},{passive:false});
canvas.addEventListener('touchmove', e=>{e.preventDefault();pickColor(e);},{passive:false});

function isLight(hex) {
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return (r*299+g*587+b*114)/1000 > 128;
}

function updateActiveBtn() {
  const activeBtn = document.querySelector('.emotion-btn.active');
  if (!activeBtn) return;
  if (selectedColor) {
    activeBtn.style.background = selectedColor;
    activeBtn.style.color = isLight(selectedColor) ? '#333' : '#fff';
  } else {
    activeBtn.style.background = 'rgba(255,255,255,0.22)';
    activeBtn.style.color = '#fff';
  }
}

function getRemaining(excludeIndex=-1) {
  const used = records.reduce((s,r,i)=>i===excludeIndex?s:s+r.percent,0);
  return Math.max(0,100-used);
}

function updateSliderMax() {
  const remain = getRemaining(editingIndex);
  percentSlider.max = remain;
  if (selectedPercent > remain) {
    selectedPercent = remain;
    percentSlider.value = remain;
    percentValue.textContent = remain+'%';
  }
  percentRemain.textContent = `残り ${remain}%`;
}

function checkReady() {
  if (selectedColor && selectedEmotion) {
    applyBtn.className = 'apply-btn ready';
    applyBtn.textContent = '入れる';
  } else {
    applyBtn.className = 'apply-btn';
    applyBtn.textContent = '言葉と色の両方を選ぶと入ります';
  }
}

function updateButtons() {
  const usedEmotions = records.map((r,i)=>i===editingIndex?null:r.emotion).filter(Boolean);
  document.querySelectorAll('.emotion-btn').forEach(btn=>{
    const isUsed = usedEmotions.includes(btn.dataset.emotion);
    if (isUsed) { btn.classList.add('hidden'); btn.disabled=true; }
    else {
      btn.classList.remove('hidden'); btn.disabled=false;
      if (!btn.classList.contains('active')) {
        btn.style.background='rgba(255,255,255,0.06)';
        btn.style.color='rgba(255,255,255,0.7)';
      }
    }
  });
}

document.querySelectorAll('.emotion-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.emotion-btn').forEach(b=>{
      if(!b.disabled){b.classList.remove('active');b.style.background='rgba(255,255,255,0.06)';b.style.color='rgba(255,255,255,0.7)';}
    });
    btn.classList.add('active');
    selectedEmotion = btn.dataset.emotion;
    selectedType = btn.dataset.type;
    blob.className = 'blob '+selectedType;
    updateActiveBtn();
    checkReady();
  });
});

percentSlider.addEventListener('input',()=>{
  selectedPercent = parseInt(percentSlider.value);
  percentValue.textContent = selectedPercent+'%';
  if(editingIndex>=0 && selectedPercent===0){
    applyBtn.className='apply-btn ready';
    applyBtn.textContent='この記録を削除する';
  } else { checkReady(); }
});

document.getElementById('moreBtn').addEventListener('click',()=>{
  const more = document.getElementById('moreEmotions');
  const btn = document.getElementById('moreBtn');
  if(more.style.display==='none'){more.style.display='grid';btn.textContent='閉じる ▴';}
  else{more.style.display='none';btn.textContent='もっと見る ▾';}
});

function updateColorIslands() {
  colorIslands.innerHTML='';
  document.querySelectorAll('[id^="igr"]').forEach(e=>e.remove());
  const activeRecs = records.filter(r=>r.percent>0);
  if(activeRecs.length===0) return;
  const cx=100, cy=104, R=69;
  const defs = document.querySelector('#blobSvg defs');
  const n = activeRecs.length;

  // %に応じた半径（球体面積を%で分割）
  const radii = activeRecs.map(rec => Math.max(8, R * Math.sqrt(rec.percent/100) * 0.88));

  // 重なりを30%以下に：2つの円が接触する距離 = r0+r1、重なり30%以下 = 距離 >= r0+r1-(min(r0,r1)*0.3)
  // つまり中心間距離 = r0 + r1 - overlap、overlapは小さい方の半径の30%まで
  function getPositions(radii) {
    const n = radii.length;
    if(n===1) return [{x:cx, y:cy}];
    if(n===2) {
      const r0=radii[0], r1=radii[1];
      const overlap = Math.min(r0,r1) * 0.28; // 28%重なり
      const dist = r0 + r1 - overlap;
      return [
        {x: cx - dist * (r1/(r0+r1)), y: cy},
        {x: cx + dist * (r0/(r0+r1)), y: cy}
      ];
    }
    if(n===3) {
      const r0=radii[0], r1=radii[1], r2=radii[2];
      const ov01 = Math.min(r0,r1)*0.28;
      const ov02 = Math.min(r0,r2)*0.28;
      const ov12 = Math.min(r1,r2)*0.28;
      const d01 = r0+r1-ov01;
      const d02 = r0+r2-ov02;
      const d12 = r1+r2-ov12;
      // 三角形配置
      const x0 = cx - d01*0.5;
      const x1 = cx + d01*0.5;
      const y01 = cy - r0*0.15;
      // 3番目は下
      const y2 = cy + r2*0.7;
      return [
        {x: x0, y: y01},
        {x: x1, y: y01},
        {x: cx, y: y2}
      ];
    }
    return [{x:cx,y:cy}];
  }

  const positions = getPositions(radii);

  activeRecs.forEach((rec,i)=>{
    const r=radii[i]; const pos=positions[i];
    const gid=`igr${i}`;
    const grad=document.createElementNS('http://www.w3.org/2000/svg','radialGradient');
    grad.setAttribute('id',gid);grad.setAttribute('cx','36%');grad.setAttribute('cy','32%');grad.setAttribute('r','68%');
    [[0,'#ffffff',0.5],[18,rec.color,0.95],[100,rec.color,0.82]].forEach(([pct,color,opacity])=>{
      const s=document.createElementNS('http://www.w3.org/2000/svg','stop');
      s.setAttribute('offset',pct+'%');s.setAttribute('stop-color',color);s.setAttribute('stop-opacity',opacity);
      grad.appendChild(s);
    });
    defs.appendChild(grad);
    const el=document.createElementNS('http://www.w3.org/2000/svg','circle');
    el.setAttribute('cx',pos.x.toFixed(1));el.setAttribute('cy',pos.y.toFixed(1));
    el.setAttribute('r',r.toFixed(1));el.setAttribute('fill',`url(#${gid})`);
    el.setAttribute('clip-path','url(#blobClip)');
    colorIslands.appendChild(el);
  });
}

function updateEmotionLabels() {
  const labelsEl = document.getElementById('emotionLabels');
  labelsEl.innerHTML='';
  const activeRecs = records.filter(r=>r.percent>0);
  if(activeRecs.length===0) return;
  const R=69;
  const cx=100, cy=104;
  const n=activeRecs.length;
  const radii=activeRecs.map(rec=>Math.max(8, R*Math.sqrt(rec.percent/100)*0.88));

  function getPositions(radii) {
    const n=radii.length;
    if(n===1) return [{x:cx,y:cy}];
    if(n===2){
      const r0=radii[0],r1=radii[1];
      const overlap=Math.min(r0,r1)*0.28;
      const dist=r0+r1-overlap;
      return [{x:cx-dist*(r1/(r0+r1)),y:cy},{x:cx+dist*(r0/(r0+r1)),y:cy}];
    }
    if(n===3){
      const r0=radii[0],r1=radii[1],r2=radii[2];
      const d01=r0+r1-Math.min(r0,r1)*0.28;
      return [{x:cx-d01*0.5,y:cy-r0*0.15},{x:cx+d01*0.5,y:cy-r1*0.15},{x:cx,y:cy+r2*0.7}];
    }
    return [{x:cx,y:cy}];
  }

  const positions=getPositions(radii);
  activeRecs.forEach((rec,i)=>{
    const pos=positions[i];
    const text=document.createElementNS('http://www.w3.org/2000/svg','text');
    text.setAttribute('x',pos.x);text.setAttribute('y',pos.y+4);
    text.setAttribute('text-anchor','middle');text.setAttribute('font-size','10');
    text.setAttribute('font-weight','bold');
    const textColor=isLight(rec.color)?'#333333':'#ffffff';
    text.setAttribute('fill',textColor);text.setAttribute('fill-opacity','0.95');
    text.setAttribute('style','font-family: Hiragino Sans, sans-serif;');
    text.textContent=rec.emotion;
    labelsEl.appendChild(text);
  });
}

function renderRecords() {
  recordsEl.innerHTML='';
  records.forEach((rec,i)=>{
    const el=document.createElement('div');
    el.className='record-item'+(editingIndex===i?' editing':'');
    el.innerHTML=`<div class="record-swatch" style="background:${rec.color}"></div>
      <span class="record-emotion">${rec.emotion}</span>
      <span class="record-pct">${rec.percent}%</span>
      <span class="record-code">${rec.color.toUpperCase()}</span>
      <span class="record-edit">タップで修正</span>`;
    el.addEventListener('click',()=>startEditing(i));
    recordsEl.appendChild(el);
  });
}

function startEditing(index) {
  editingIndex=index;
  const rec=records[index];
  document.querySelectorAll('.emotion-btn').forEach(b=>{b.classList.remove('active');b.style.background='rgba(255,255,255,0.06)';b.style.color='rgba(255,255,255,0.7)';});
  updateButtons();
  const btn=[...document.querySelectorAll('.emotion-btn')].find(b=>b.dataset.emotion===rec.emotion);
  if(btn){btn.disabled=false;btn.classList.remove('hidden');btn.classList.add('active');btn.style.background=rec.color;btn.style.color=isLight(rec.color)?'#333':'#fff';}
  selectedEmotion=rec.emotion;selectedType=rec.type;selectedColor=rec.color;selectedPercent=rec.percent;
  swatch.style.background=rec.color;codeEl.textContent=rec.color.toUpperCase();
  percentSlider.value=rec.percent;percentValue.textContent=rec.percent+'%';
  blob.className='blob '+rec.type;
  updateSliderMax();checkReady();renderRecords();
}

function addRecord(emotion,color,type,percent) {
  const rec={emotion,color,type,percent};
  if(editingIndex>=0){
    if(percent===0){records.splice(editingIndex,1);}
    else{records[editingIndex]=rec;}
    editingIndex=-1;
    updateColorIslands();updateEmotionLabels();renderRecords();resetInput();
  } else if(records.length<3){
    records.push(rec);
    updateColorIslands();updateEmotionLabels();renderRecords();resetInput();
  } else {
    pendingRecord=rec;showModal();
  }
}

function resetInput() {
  selectedColor=null;selectedEmotion=null;selectedType=null;selectedPercent=50;editingIndex=-1;
  percentSlider.value=50;percentValue.textContent='50%';
  swatch.style.background='#888';codeEl.textContent='色を選んでください';
  document.querySelectorAll('.emotion-btn').forEach(b=>{b.classList.remove('active');b.style.background='rgba(255,255,255,0.06)';b.style.color='rgba(255,255,255,0.7)';});
  blob.className='blob';
  updateEmotionLabels();updateButtons();updateSliderMax();checkReady();
}

function showModal() {
  modalRecordsEl.innerHTML='';
  records.forEach((rec,i)=>{
    const el=document.createElement('div');
    el.className='modal-record';
    el.innerHTML=`<div class="modal-swatch" style="background:${rec.color}"></div>
      <div class="modal-info"><span class="modal-emotion">${rec.emotion}</span>
      <span class="modal-pct">${rec.percent}%　${rec.color.toUpperCase()}</span></div>`;
    el.addEventListener('click',()=>{
      records[i]=pendingRecord;pendingRecord=null;
      updateColorIslands();updateEmotionLabels();renderRecords();resetInput();hideModal();
    });
    modalRecordsEl.appendChild(el);
  });
  modalOverlay.classList.add('visible');
}
function hideModal(){modalOverlay.classList.remove('visible');pendingRecord=null;}
modalCancel.addEventListener('click',hideModal);

applyBtn.addEventListener('click',()=>{
  if(!selectedColor||!selectedEmotion) return;
  addRecord(selectedEmotion,selectedColor,selectedType,selectedPercent);
});

updateSliderMax();checkReady();
</script>
</body>
</html>
